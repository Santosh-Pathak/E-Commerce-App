# CD — push images to Docker Hub, update K8s manifests, GitOps handoff to Argo CD
# Runs after DevSecOps succeeds
# Runner: self-hosted (labels: self-hosted, linux, easyshop)
name: CD

on:
  workflow_run:
    workflows: [DevSecOps]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: easyshop-pipeline-main
  cancel-in-progress: false

env:
  DOCKER_IMAGE_NAME: Santosh-Pathak/E-Commerce-App
  DOCKER_MIGRATION_IMAGE_NAME: Santosh-Pathak/E-Commerce-App-migration

permissions:
  contents: write
  actions: read

jobs:
  deploy-gitops:
    name: Push Images & Update Manifests
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: [self-hosted, linux, easyshop]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download image tag from DevSecOps workflow
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load image tag
        run: |
          IMAGE_TAG=$(cat image-tag.txt)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push app image
        run: docker push ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Push migration image
        run: docker push ${{ env.DOCKER_MIGRATION_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Update Kubernetes manifest image tags
        run: |
          sed -i "s|image: ${DOCKER_IMAGE_NAME}:.*|image: ${DOCKER_IMAGE_NAME}:${IMAGE_TAG}|" kubernetes/08-easyshop-deployment.yml
          sed -i "s|image: ${DOCKER_MIGRATION_IMAGE_NAME}:.*|image: ${DOCKER_MIGRATION_IMAGE_NAME}:${IMAGE_TAG}|" kubernetes/12-migration-job.yml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/08-easyshop-deployment.yml kubernetes/12-migration-job.yml
          if git diff --staged --quiet; then
            echo "Manifest image tags already up to date."
          else
            git commit -m "cd: update image tags to ${IMAGE_TAG}"
            git push
          fi
