# Build — Docker images for app + migration (local load, no push)
# Runs after CI succeeds on push to main; triggers DevSecOps via workflow_run
# Runner: self-hosted (labels: self-hosted, linux, easyshop)
name: Build

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: easyshop-pipeline-main
  cancel-in-progress: false

env:
  DOCKER_IMAGE_NAME: Santosh-Pathak/E-Commerce-App
  DOCKER_MIGRATION_IMAGE_NAME: Santosh-Pathak/E-Commerce-App-migration

permissions:
  contents: read

jobs:
  build-images:
    name: Build Docker Images
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    runs-on: [self-hosted, linux, easyshop]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set image tag
        id: meta
        run: |
          RUN_NUM="${{ github.event.workflow_run.run_number || github.run_number }}"
          echo "IMAGE_TAG=${RUN_NUM}" >> "${GITHUB_ENV}"
          echo "image-tag=${RUN_NUM}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Build migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/Dockerfile.migration
          load: true
          tags: ${{ env.DOCKER_MIGRATION_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Save image tag for downstream workflows
        run: echo "${IMAGE_TAG}" > image-tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt
          retention-days: 7
